<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MKWN4110 - PANCASILA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    #question {
      font-size: 20px;
      margin-bottom: 20px;
    }
    #options button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 10px;
      font-size: 16px;
      background: #fff;
      border: 2px solid #007BFF;
      border-radius: 5px;
      cursor: pointer;
    }
    #options button:hover {
      background: #007BFF;
      color: #fff;
    }
    #result {
      font-weight: bold;
      margin-top: 15px;
    }
    #nextBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #nextBtn:hover {
      background: #218838;
    }
    #progress {
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>MKWN4110 - PANCASILA</h1>
  <div id="progress"></div>
  <h2 id="question"></h2>
  <div id="options"></div>
  <p id="result"></p>
  <button id="nextBtn" onclick="nextQuestion()">Soal berikutnya</button>

  <script>
    const quiz = [
      {
        q: "Dalam sidang BPUPK yang pertama, Soepomo menguraikan tentang syarat mutlak untuk mengadakan negara dipandang dari sudut hukum dan dari sudut formeel. Syarat yang dimaksud Soepomo antara lain adalah....",
        options: [
          "wilayah, rakyat, dan kedaulatan sebagai syarat mutlak berdirinya negara",
          "pemerintahan yang demokratis dan pemilu sebagai syarat mutlak berdirinya negara",
          "lembaga legislatif, eksekutif, dan yudikatif sebagai syarat mutlak berdirinya negara",
          "kesatuan agama, adat, dan bahasa sebagai syarat mutlak berdirinya negara"
        ],
        answer: 0,
        explanation: "Soepomo menekankan bahwa syarat mutlak berdirinya negara adalah adanya wilayah, rakyat, dan kedaulatan."
      },
      {
        q: "Pernyataan yang paling tepat untuk menjelaskan peran Pancasila sebagai bagian penting bagi masyarakat dan negara dalam konteks dulu dan kini adalah....",
        options: [
          "Pancasila merupakan proyek pendidikan kebangsaan dan karakter...",
          "Pancasila sejak awal reformasi tidak lagi menjadi dasar negara...",
          "Pancasila hanya berfungsi sebagai simbol pemersatu...",
          "Pancasila setelah reformasi hanya dipahami sebagai sejarah..."
        ],
        answer: 0,
        explanation: "Pancasila tetap menjadi dasar negara sekaligus proyek pendidikan kebangsaan dan karakter, relevan dari dulu hingga kini."
      }
    ];

    let current = 0;

    function loadQuestion() {
      document.getElementById("progress").innerText = "Soal " + (current+1) + " dari " + quiz.length;
      document.getElementById("question").innerText = quiz[current].q;
      let opts = "";
      quiz[current].options.forEach((opt, i) => {
        opts += `<button onclick="checkAnswer(${i})">${opt}</button><br>`;
      });
      document.getElementById("options").innerHTML = opts;
      document.getElementById("result").innerText = "";
    }

    function checkAnswer(i) {
      if (i === quiz[current].answer) {
        document.getElementById("result").innerText = "✅ Benar! " + quiz[current].explanation;
      } else {
        document.getElementById("result").innerText = "❌ Salah. " + quiz[current].explanation;
      }
    }

    function nextQuestion() {
      current++;
      if (current < quiz.length) {
        loadQuestion();
      } else {
        document.getElementById("progress").innerText = "";
        document.getElementById("question").innerText = "Kuis selesai!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("nextBtn").style.display = "none";
      }
    }

    loadQuestion();
  </script>
</body>
</html>
